<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0a0a14">
<title>推し活VLOG</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" href="icon-192.png">
<style>
  html, body {
    touch-action: pan-x pan-y;
    overflow-x: hidden;
    width: 100%;
    max-width: 100vw;
  }
  * {
    touch-action: pan-x pan-y;
  }
  input, textarea, select {
    font-size: 16px;
  }
  :root {
    --bg: #0a0a14;
    --bg-card: #13131f;
    --neon-pink: #ff2ec4;
    --neon-cyan: #00f0ff;
    --neon-purple: #b14eff;
    --neon-yellow: #faff00;
    --text: #e8e8ff;
    --text-dim: #8888aa;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Helvetica Neue', 'Hiragino Sans', sans-serif;
    background: var(--bg);
    background-image:
      radial-gradient(circle at 15% 10%, rgba(177,78,255,0.25), transparent 40%),
      radial-gradient(circle at 85% 90%, rgba(0,240,255,0.2), transparent 40%);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 90px;
  }
  header {
    position: relative;
    height: 180px;
    background-image: var(--header-img, url('header.jpg'));
    background-size: cover;
    background-position: center;
    display: flex;
    align-items: flex-end;
    justify-content: flex-start;
    padding: 0;
    overflow: hidden;
    transition: background-image 0.3s;
  }
  header::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(10,10,20,0.85) 0%, rgba(10,10,20,0.1) 60%, transparent 100%);
  }
  header .title-wrap {
    position: relative;
    z-index: 1;
    padding: 0 16px 12px;
  }
  header h1 {
    margin: 0;
    font-size: 26px;
    font-weight: 900;
    letter-spacing: 2px;
    background: linear-gradient(90deg, var(--neon-pink), var(--neon-cyan), var(--neon-purple));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    text-shadow: 0 0 20px rgba(255,46,196,0.4);
  }
  header p {
    margin: 2px 0 0;
    color: var(--text-dim);
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  .settings-btn {
    position: absolute;
    top: 10px;
    right: 10px;
    z-index: 2;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: 1px solid rgba(0,240,255,0.4);
    background: rgba(10,10,20,0.55);
    color: var(--neon-cyan);
    font-size: 15px;
    cursor: pointer;
    backdrop-filter: blur(2px);
  }
  .settings-panel {
    display: none;
    flex-direction: column;
    gap: 8px;
    padding: 12px 16px;
    max-width: 600px;
    margin: 0 auto;
  }
  .settings-panel.show { display: flex; }
  .settings-label {
    font-size: 11px;
    color: var(--neon-purple);
    letter-spacing: 1px;
    text-align: center;
    margin-top: 4px;
  }
  .order-row {
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(0,240,255,0.05);
    border: 1px solid rgba(0,240,255,0.15);
    border-radius: 8px;
    padding: 6px 10px;
    margin-bottom: 4px;
  }
  .order-row .order-name {
    flex: 1;
    font-size: 12px;
    font-weight: bold;
    color: var(--text);
  }
  .order-row button {
    background: transparent;
    border: 1px solid rgba(0,240,255,0.3);
    color: var(--neon-cyan);
    border-radius: 6px;
    width: 30px;
    height: 26px;
    font-size: 12px;
    cursor: pointer;
  }
  .order-row button:disabled {
    opacity: 0.25;
    cursor: default;
  }
  .settings-panel button, .settings-panel label {
    background: transparent;
    border: 1px solid rgba(0,240,255,0.3);
    color: var(--text-dim);
    padding: 8px 14px;
    border-radius: 10px;
    font-size: 12px;
    font-weight: bold;
    cursor: pointer;
    letter-spacing: 1px;
    text-align: center;
  }
  .settings-panel button:active, .settings-panel label:active {
    border-color: var(--neon-cyan);
    color: var(--neon-cyan);
  }

  /* Oshi sticky-note tabs */
  .oshibar {
    display: flex;
    gap: 8px;
    padding: 14px 16px;
    overflow-x: auto;
    max-width: 600px;
    margin: 0 auto;
  }
  .oshi-tab {
    flex-shrink: 0;
    padding: 10px 18px;
    font-size: 13px;
    font-weight: 900;
    letter-spacing: 1px;
    white-space: nowrap;
    cursor: pointer;
    border-radius: 10px;
    background: var(--bg-card);
    color: var(--text-dim);
    border: 1px solid rgba(255,255,255,0.08);
    position: relative;
    box-shadow: 0 2px 6px rgba(0,0,0,0.3);
    opacity: 1;
    transition: all 0.15s;
  }
  .oshi-tab:nth-child(1) { border-color: rgba(255,46,196,0.4); }
  .oshi-tab:nth-child(2) { border-color: rgba(0,240,255,0.4); }
  .oshi-tab:nth-child(3) { border-color: rgba(250,255,0,0.4); }
  .oshi-tab:nth-child(4) { border-color: rgba(177,78,255,0.4); }
  .oshi-tab:nth-child(5) { border-color: rgba(0,255,163,0.4); }
  .oshi-tab:nth-child(6) { border-color: rgba(255,157,46,0.4); }
  .oshi-tab.active:nth-child(1) { background: var(--neon-pink); color: var(--bg); border-color: var(--neon-pink); }
  .oshi-tab.active:nth-child(2) { background: var(--neon-cyan); color: var(--bg); border-color: var(--neon-cyan); }
  .oshi-tab.active:nth-child(3) { background: var(--neon-yellow); color: var(--bg); border-color: var(--neon-yellow); }
  .oshi-tab.active:nth-child(4) { background: var(--neon-purple); color: #fff; border-color: var(--neon-purple); }
  .oshi-tab.active:nth-child(5) { background: #00ffa3; color: var(--bg); border-color: #00ffa3; }
  .oshi-tab.active:nth-child(6) { background: #ff9d2e; color: var(--bg); border-color: #ff9d2e; }
  .oshi-tab.active:nth-child(n+7) { background: var(--text-dim); color: var(--bg); }
  .oshi-tab.active {
    box-shadow: 0 4px 14px rgba(255,46,196,0.3);
  }


  #list {
    padding: 0 12px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    max-width: 600px;
    margin: 0 auto;
  }

  .empty {
    text-align: center;
    color: var(--text-dim);
    padding: 60px 20px;
    font-size: 14px;
    line-height: 1.8;
  }

  .card {
    background: var(--bg-card);
    border: 1px solid rgba(255,46,196,0.3);
    border-radius: 14px;
    padding: 14px;
    box-shadow: 0 0 0 1px rgba(0,240,255,0.05), 0 4px 20px rgba(0,0,0,0.5);
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--neon-pink), var(--neon-cyan), var(--neon-purple), var(--neon-pink));
  }
  .card-head {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 10px;
  }
  .card-info {
    flex: 1;
    min-width: 0;
  }
  .card-date {
    font-size: 11px;
    color: var(--neon-cyan);
    letter-spacing: 1px;
    font-weight: bold;
    text-shadow: 0 0 6px rgba(0,240,255,0.5);
  }
  .card-title {
    font-size: 18px;
    font-weight: 900;
    margin: 4px 0 2px;
    color: var(--text);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .card-title:active { opacity: 0.7; }
  .card-title .chev {
    font-size: 13px;
    color: var(--neon-cyan);
    transition: transform 0.2s;
    flex-shrink: 0;
  }
  .card.open .card-title .chev { transform: rotate(90deg); }
  .card-title .title-text {
    flex: 1;
    min-width: 0;
  }
  .title-thumb {
    width: 120px;
    height: 120px;
    border-radius: 10px;
    object-fit: cover;
    border: 1px solid rgba(0,240,255,0.4);
    flex-shrink: 0;
    cursor: zoom-in;
  }
  .card-venue {
    font-size: 12px;
    color: var(--neon-purple);
  }
  .card-seat {
    font-size: 11px;
    color: var(--text-dim);
    margin-top: 2px;
  }
  .card-detail {
    display: none;
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px dashed rgba(0,240,255,0.2);
  }
  .card.open .card-detail { display: block; }
  .card-memo {
    font-size: 13px;
    line-height: 1.7;
    color: var(--text);
    white-space: pre-wrap;
  }
  .card-images {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    margin-top: 10px;
    padding-bottom: 4px;
  }
  .card-images img {
    height: 100px;
    width: auto;
    border-radius: 8px;
    border: 1px solid rgba(0,240,255,0.3);
    flex-shrink: 0;
    object-fit: cover;
  }
  .card-actions {
    margin-top: 10px;
    display: flex;
    gap: 8px;
    justify-content: flex-end;
  }
  .card-actions button {
    background: none;
    border: none;
    color: var(--text-dim);
    font-size: 11px;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 6px;
  }
  .card-actions button.delete { color: var(--neon-pink); }
  .card-actions button:active { background: rgba(255,255,255,0.08); }

  .fab {
    position: fixed;
    bottom: 22px;
    right: 22px;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--neon-pink), var(--neon-purple));
    border: none;
    color: white;
    font-size: 28px;
    font-weight: bold;
    box-shadow: 0 0 30px rgba(255,46,196,0.6), 0 4px 12px rgba(0,0,0,0.5);
    cursor: pointer;
    z-index: 50;
  }

  /* Modal */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px);
    display: none;
    align-items: flex-end;
    justify-content: center;
    z-index: 100;
  }
  .overlay.show { display: flex; }
  .modal {
    background: var(--bg-card);
    border-top: 1px solid var(--neon-cyan);
    box-shadow: 0 0 40px rgba(0,240,255,0.2);
    border-radius: 20px 20px 0 0;
    width: 100%;
    max-width: 600px;
    max-height: 90vh;
    overflow-y: auto;
    overflow-x: hidden;
    box-sizing: border-box;
    padding: 20px 16px 30px;
  }
  .modal h2 {
    margin: 0 0 16px;
    font-size: 18px;
    background: linear-gradient(90deg, var(--neon-pink), var(--neon-cyan));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .field { margin-bottom: 14px; }
  .field label {
    display: block;
    font-size: 11px;
    color: var(--neon-cyan);
    letter-spacing: 1px;
    margin-bottom: 6px;
    text-transform: uppercase;
  }
  .field input, .field textarea {
    width: 100%;
    background: #0a0a14;
    border: 1px solid rgba(0,240,255,0.3);
    color: var(--text);
    padding: 10px 12px;
    border-radius: 8px;
    font-size: 14px;
    font-family: inherit;
  }
  .field input:focus, .field textarea:focus {
    outline: none;
    border-color: var(--neon-cyan);
    box-shadow: 0 0 10px rgba(0,240,255,0.3);
  }
  .field textarea { min-height: 90px; resize: vertical; }
  .field .hint {
    font-size: 10px;
    color: var(--text-dim);
    margin-top: 4px;
  }

  .img-preview {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-top: 8px;
  }
  .img-preview .thumb {
    position: relative;
    width: 72px;
    height: 72px;
  }
  .img-preview img {
    width: 72px;
    height: 72px;
    object-fit: cover;
    border-radius: 8px;
    border: 1px solid rgba(255,46,196,0.4);
  }
  .img-preview .rm {
    position: absolute;
    top: -6px; right: -6px;
    background: var(--neon-pink);
    color: #fff;
    border: none;
    border-radius: 50%;
    width: 20px; height: 20px;
    font-size: 12px;
    line-height: 18px;
    cursor: pointer;
  }

  .modal-actions {
    display: flex;
    gap: 10px;
    margin-top: 20px;
  }
  .modal-actions button {
    flex: 1;
    padding: 12px;
    border-radius: 10px;
    border: none;
    font-weight: bold;
    font-size: 14px;
    cursor: pointer;
  }
  .btn-save {
    background: linear-gradient(135deg, var(--neon-pink), var(--neon-purple));
    color: white;
    box-shadow: 0 0 20px rgba(255,46,196,0.4);
  }
  .btn-cancel {
    background: transparent;
    border: 1px solid var(--text-dim);
    color: var(--text-dim);
  }

  /* Image viewer */
  .img-viewer {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.9);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 200;
    padding: 20px;
  }
  .img-viewer.show { display: flex; }
  .img-viewer img {
    max-width: 100%;
    max-height: 100%;
    border-radius: 8px;
    box-shadow: 0 0 40px rgba(0,240,255,0.3);
  }

  .toast {
    position: fixed;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--bg-card);
    border: 1px solid var(--neon-cyan);
    color: var(--neon-cyan);
    padding: 10px 20px;
    border-radius: 20px;
    font-size: 13px;
    box-shadow: 0 0 20px rgba(0,240,255,0.4);
    z-index: 300;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<header>
  <div class="title-wrap">
    <h1>Vlog</h1>
    <p>OSHI ACTIVITY RECORD</p>
  </div>
  <button class="settings-btn" onclick="toggleSettings()">⚙</button>
</header>

<div class="settings-panel" id="settingsPanel">
  <div class="settings-label" id="headerLabel">ヘッダー画像(すべて共通)</div>
  <label>🖼 ヘッダー画像を変更
    <input type="file" accept="image/*" style="display:none" onchange="handleHeaderImage(event)">
  </label>
  <button id="resetHeaderBtn" onclick="resetHeaderImage()" style="display:none;">↺ デフォルトに戻す</button>
  <div class="settings-label">カテゴリの並び順</div>
  <div id="oshiOrderList"></div>
  <button onclick="exportData()">⬇ バックアップ書き出し</button>
  <label>⬆ 復元
    <input type="file" accept="application/json" style="display:none" onchange="importData(event)">
  </label>
  <button onclick="location.reload()">🔄 リロード</button>
</div>

<div class="oshibar" id="oshibar"></div>



<div id="list"></div>

<button class="fab" onclick="openModal()">＋</button>

<!-- Entry Modal -->
<div class="overlay" id="overlay">
  <div class="modal">
    <h2 id="modalTitle">参戦記録を追加</h2>
    <div class="field">
      <label>日付</label>
      <input type="date" id="f-date">
    </div>
    <div class="field">
      <label>タイトル画像(サムネイル)</label>
      <input type="file" id="f-thumb" accept="image/*" onchange="handleThumb(event)">
      <div class="img-preview" id="thumbPreview"></div>
      <div class="hint">タイトルの横に小さく表示されます</div>
    </div>
    <div class="field">
      <label>タイトル(ライブ名・イベント名)</label>
      <input type="text" id="f-title" placeholder="例: ○○ 5th Anniversary Live">
    </div>
    <div class="field">
      <label>会場</label>
      <input type="text" id="f-venue" placeholder="例: 横浜アリーナ">
    </div>
    <div class="field">
      <label>座席</label>
      <input type="text" id="f-seat" placeholder="例: アリーナ Aブロック 12列 34番">
    </div>
    <div class="field">
      <label>推し(カテゴリタブ)</label>
      <input type="text" id="f-oshi" placeholder="例: ミセス, あいみょん">
      <div class="hint">画面上部のタブで切り替えられます</div>
    </div>
    <div class="field">
      <label>感想・メモ</label>
      <textarea id="f-memo" placeholder="セットリストや感想など自由に"></textarea>
    </div>
    <div class="field">
      <label>画像(チケット・写真など)</label>
      <input type="file" id="f-images" accept="image/*" multiple onchange="handleImages(event)">
      <div class="img-preview" id="imgPreview"></div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">キャンセル</button>
      <button class="btn-save" onclick="saveEntry()">保存</button>
    </div>
  </div>
</div>

<!-- Image full view -->
<div class="img-viewer" id="imgViewer" onclick="this.classList.remove('show')">
  <img id="imgViewerSrc" src="">
</div>

<div class="toast" id="toast"></div>

<script>
const STORAGE_KEY = 'oshikatsu_log_entries';
let entries = [];
let currentImages = [];
let currentThumb = null;
let editingId = null;
let activeOshi = null;

function toggleSettings() {
  document.getElementById('settingsPanel').classList.toggle('show');
}

const DEFAULT_HEADER_KEY = '__default__';

function headerKeyFor(oshi) {
  return oshi || DEFAULT_HEADER_KEY;
}

async function applyHeaderImage() {
  const key = headerKeyFor(activeOshi);
  let img = await dbGetHeader(key);
  if (!img && key !== DEFAULT_HEADER_KEY) {
    img = await dbGetHeader(DEFAULT_HEADER_KEY);
  }
  const header = document.querySelector('header');
  const resetBtn = document.getElementById('resetHeaderBtn');
  const label = document.getElementById('headerLabel');
  if (img) {
    header.style.setProperty('--header-img', `url('${img}')`);
  } else {
    header.style.removeProperty('--header-img');
  }
  const hasCustomForThisCategory = await dbGetHeader(key);
  resetBtn.style.display = hasCustomForThisCategory ? 'block' : 'none';
  label.textContent = activeOshi ? `ヘッダー画像(${activeOshi})` : 'ヘッダー画像(デフォルト)';
}

async function handleHeaderImage(event) {
  const file = event.target.files[0];
  if (!file) return;
  try {
    const dataUrl = await compressImage(file, 1600, 0.85);
    const key = headerKeyFor(activeOshi);
    await dbSetHeader(key, dataUrl);
    await applyHeaderImage();
    showToast('ヘッダー画像を変更しました ✓');
  } catch(e) {
    showToast('画像の読み込みに失敗しました');
  }
  event.target.value = '';
}

async function resetHeaderImage() {
  const key = headerKeyFor(activeOshi);
  await dbDeleteHeader(key);
  await applyHeaderImage();
  showToast('デフォルトに戻しました');
}

const DB_NAME = 'oshikatsu_log_db';
const DB_STORE = 'entries';
const HEADER_STORE = 'headers';
let db = null;

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, 2);
    req.onupgradeneeded = e => {
      const database = e.target.result;
      if (!database.objectStoreNames.contains(DB_STORE)) {
        database.createObjectStore(DB_STORE, { keyPath: 'id' });
      }
      if (!database.objectStoreNames.contains(HEADER_STORE)) {
        database.createObjectStore(HEADER_STORE, { keyPath: 'key' });
      }
    };
    req.onsuccess = e => resolve(e.target.result);
    req.onerror = e => reject(e.target.error);
  });
}

function dbGetHeader(key) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(HEADER_STORE, 'readonly');
    const req = tx.objectStore(HEADER_STORE).get(key);
    req.onsuccess = () => resolve(req.result ? req.result.value : null);
    req.onerror = () => reject(req.error);
  });
}

function dbSetHeader(key, value) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(HEADER_STORE, 'readwrite');
    tx.objectStore(HEADER_STORE).put({ key, value });
    tx.oncomplete = () => resolve(true);
    tx.onerror = () => reject(tx.error);
  });
}

function dbDeleteHeader(key) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(HEADER_STORE, 'readwrite');
    tx.objectStore(HEADER_STORE).delete(key);
    tx.oncomplete = () => resolve(true);
    tx.onerror = () => reject(tx.error);
  });
}

function dbGetAll() {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(DB_STORE, 'readonly');
    const store = tx.objectStore(DB_STORE);
    const req = store.getAll();
    req.onsuccess = () => resolve(req.result || []);
    req.onerror = () => reject(req.error);
  });
}

function dbPut(entry) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(DB_STORE, 'readwrite');
    tx.objectStore(DB_STORE).put(entry);
    tx.oncomplete = () => resolve(true);
    tx.onerror = () => reject(tx.error);
  });
}

function dbDelete(id) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(DB_STORE, 'readwrite');
    tx.objectStore(DB_STORE).delete(id);
    tx.oncomplete = () => resolve(true);
    tx.onerror = () => reject(tx.error);
  });
}

function dbClear() {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(DB_STORE, 'readwrite');
    tx.objectStore(DB_STORE).clear();
    tx.oncomplete = () => resolve(true);
    tx.onerror = () => reject(tx.error);
  });
}

function dbPutAll(list) {
  return new Promise((resolve, reject) => {
    const tx = db.transaction(DB_STORE, 'readwrite');
    const store = tx.objectStore(DB_STORE);
    list.forEach(item => store.put(item));
    tx.oncomplete = () => resolve(true);
    tx.onerror = () => reject(tx.error);
  });
}

async function load() {
  try {
    db = await openDB();
    entries = await migrateFromLocalStorageIfNeeded();
    if (entries === null) entries = await dbGetAll();
    await loadOshiOrder();
  } catch(e) {
    entries = [];
    showToast('⚠ データベースの読み込みに失敗しました');
  }
  const list = getAllOshi();
  if (list.length > 0) activeOshi = list[0];
  render();
  applyHeaderImage();
}

// One-time migration: if old localStorage data exists and IndexedDB is empty, move it over
async function migrateFromLocalStorageIfNeeded() {
  const existing = await dbGetAll();
  if (existing.length > 0) return existing;
  try {
    const old = JSON.parse(localStorage.getItem(STORAGE_KEY));
    if (Array.isArray(old) && old.length > 0) {
      await dbPutAll(old);
      localStorage.removeItem(STORAGE_KEY);
      showToast('過去のデータを新しい保存形式に移行しました ✓');
      return old;
    }
  } catch(e) {}
  return null;
}

async function save(updatedEntry, deletedId) {
  try {
    if (deletedId) {
      await dbDelete(deletedId);
    } else if (updatedEntry) {
      await dbPut(updatedEntry);
    }
    return true;
  } catch(e) {
    showToast('⚠ 保存に失敗しました');
    return false;
  }
}

// Resize/compress an image file to a JPEG data URL to keep storage small
function compressImage(file, maxSize, quality) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        let { width, height } = img;
        if (width > maxSize || height > maxSize) {
          if (width > height) {
            height = Math.round(height * (maxSize / width));
            width = maxSize;
          } else {
            width = Math.round(width * (maxSize / height));
            height = maxSize;
          }
        }
        const canvas = document.createElement('canvas');
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

const OSHI_ORDER_KEY = '__oshi_order__';
let oshiOrder = [];

async function loadOshiOrder() {
  oshiOrder = await dbGetHeader(OSHI_ORDER_KEY) || [];
}

async function saveOshiOrder() {
  await dbSetHeader(OSHI_ORDER_KEY, oshiOrder);
}

function getAllOshi() {
  const set = new Set();
  entries.forEach(e => { if (e.oshi) set.add(e.oshi); });
  // keep saved order for known items, append any new ones at the end
  const known = oshiOrder.filter(o => set.has(o));
  const extra = [...set].filter(o => !oshiOrder.includes(o)).sort();
  const combined = [...known, ...extra];
  if (extra.length > 0) {
    oshiOrder = combined;
    saveOshiOrder();
  }
  return combined;
}

function renderOshibar() {
  const list = getAllOshi();
  const bar = document.getElementById('oshibar');
  if (list.length === 0) { bar.innerHTML = ''; return; }
  bar.innerHTML = list.map(o => `<div class="oshi-tab ${activeOshi===o?'active':''}" onclick="setOshiFilter('${o.replace(/'/g,"\\'")}')">${escapeHtml(o)}</div>`).join('');
  renderOshiOrderList();
}

function renderOshiOrderList() {
  const el = document.getElementById('oshiOrderList');
  if (!el) return;
  const list = getAllOshi();
  if (list.length === 0) { el.innerHTML = ''; return; }
  el.innerHTML = list.map((o, i) => `
    <div class="order-row">
      <span class="order-name">${escapeHtml(o)}</span>
      <button onclick="moveOshi(${i}, -1)" ${i===0?'disabled':''}>▲</button>
      <button onclick="moveOshi(${i}, 1)" ${i===list.length-1?'disabled':''}>▼</button>
    </div>
  `).join('');
}

async function moveOshi(index, dir) {
  const list = getAllOshi();
  const target = index + dir;
  if (target < 0 || target >= list.length) return;
  [list[index], list[target]] = [list[target], list[index]];
  oshiOrder = list;
  await saveOshiOrder();
  render();
}

function setOshiFilter(oshi) {
  activeOshi = (activeOshi === oshi) ? null : oshi;
  render();
  applyHeaderImage();
  refreshViewport();
}

function refreshViewport() {
  const vp = document.querySelector('meta[name=viewport]');
  const content = vp.getAttribute('content');
  vp.setAttribute('content', content + ', maximum-scale=1.0');
  setTimeout(() => vp.setAttribute('content', content), 50);
}

function render() {
  renderOshibar();
  const list = document.getElementById('list');
  let filtered = entries;
  if (activeOshi) {
    filtered = filtered.filter(e => e.oshi === activeOshi);
  }
  if (filtered.length === 0) {
    list.innerHTML = entries.length === 0
      ? '<div class="empty">まだ記録がありません。<br>右下の「＋」から最初の参戦記録を追加しよう！</div>'
      : '<div class="empty">このカテゴリの記録はまだありません。</div>';
    return;
  }
  const sorted = [...filtered].sort((a,b) => (b.date||'').localeCompare(a.date||''));
  list.innerHTML = sorted.map(e => `
    <div class="card" id="card-${e.id}">
      <div class="card-head">
        <div class="card-info">
          <div class="card-date">${e.date || '日付未設定'}</div>
          <div class="card-title" onclick="toggleCard('${e.id}')">
            <span class="chev">▶</span>
            <span class="title-text">${escapeHtml(e.title || '(無題)')}</span>
          </div>
          ${e.venue ? `<div class="card-venue">📍 ${escapeHtml(e.venue)}</div>` : ''}
          ${e.seat ? `<div class="card-seat">🎫 ${escapeHtml(e.seat)}</div>` : ''}
        </div>
        ${e.thumb ? `<img class="title-thumb" src="${e.thumb}" onclick="event.stopPropagation(); viewImage('${e.thumb.replace(/'/g,"\\'")}')">` : ''}
      </div>
      <div class="card-detail">
        ${e.memo ? `<div class="card-memo">${escapeHtml(e.memo)}</div>` : ''}
        ${e.images && e.images.length ? `<div class="card-images">${e.images.map(img => `<img src="${img}" onclick="event.stopPropagation(); viewImage('${img.replace(/'/g,"\\'")}')">`).join('')}</div>` : ''}
        <div class="card-actions">
          <button onclick="editEntry('${e.id}')">編集</button>
          <button class="delete" onclick="deleteEntry('${e.id}')">削除</button>
        </div>
      </div>
    </div>
  `).join('');
}

function toggleCard(id) {
  const card = document.getElementById('card-' + id);
  if (card) card.classList.toggle('open');
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function openModal(entry) {
  editingId = entry ? entry.id : null;
  document.getElementById('modalTitle').textContent = entry ? '参戦記録を編集' : '参戦記録を追加';
  document.getElementById('f-date').value = entry ? entry.date : new Date().toISOString().slice(0,10);
  document.getElementById('f-title').value = entry ? entry.title : '';
  document.getElementById('f-venue').value = entry ? entry.venue : '';
  document.getElementById('f-seat').value = entry ? entry.seat : '';
  document.getElementById('f-oshi').value = entry ? (entry.oshi || '') : (activeOshi || '');
  document.getElementById('f-memo').value = entry ? entry.memo : '';
  currentImages = entry ? [...(entry.images||[])] : [];
  currentThumb = entry ? (entry.thumb || null) : null;
  renderImgPreview();
  renderThumbPreview();
  document.getElementById('overlay').classList.add('show');
  refreshViewport();
}

function closeModal() {
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('f-images').value = '';
  document.getElementById('f-thumb').value = '';
}

async function handleImages(event) {
  const files = Array.from(event.target.files);
  if (files.length === 0) return;
  showToast(`画像を処理中... (${files.length}枚)`);
  for (const file of files) {
    try {
      const dataUrl = await compressImage(file, 1280, 0.8);
      currentImages.push(dataUrl);
      renderImgPreview();
    } catch(e) {
      showToast('画像の読み込みに失敗しました');
    }
  }
  showToast('画像を追加しました ✓');
}

async function handleThumb(event) {
  const file = event.target.files[0];
  if (!file) return;
  try {
    currentThumb = await compressImage(file, 1000, 0.85);
    renderThumbPreview();
  } catch(e) {
    showToast('画像の読み込みに失敗しました');
  }
}

function renderThumbPreview() {
  const el = document.getElementById('thumbPreview');
  if (!currentThumb) { el.innerHTML = ''; return; }
  el.innerHTML = `
    <div class="thumb">
      <img src="${currentThumb}">
      <button class="rm" onclick="removeThumb()">×</button>
    </div>
  `;
}

function removeThumb() {
  currentThumb = null;
  renderThumbPreview();
  document.getElementById('f-thumb').value = '';
}

function renderImgPreview() {
  const el = document.getElementById('imgPreview');
  el.innerHTML = currentImages.map((img, i) => `
    <div class="thumb">
      <img src="${img}">
      <button class="rm" onclick="removeImage(${i})">×</button>
    </div>
  `).join('');
}

function removeImage(i) {
  currentImages.splice(i, 1);
  renderImgPreview();
}

async function saveEntry() {
  const title = document.getElementById('f-title').value.trim();
  if (!title) {
    showToast('タイトルを入力してください');
    return;
  }
  const data = {
    id: editingId || Date.now().toString(),
    date: document.getElementById('f-date').value,
    title: title,
    oshi: document.getElementById('f-oshi').value.trim(),
    venue: document.getElementById('f-venue').value.trim(),
    seat: document.getElementById('f-seat').value.trim(),
    memo: document.getElementById('f-memo').value.trim(),
    images: [...currentImages],
    thumb: currentThumb
  };
  if (!(await save(data))) return;
  if (editingId) {
    const idx = entries.findIndex(e => e.id === editingId);
    if (idx >= 0) entries[idx] = data;
  } else {
    entries.push(data);
  }
  render();
  closeModal();
  showToast('保存しました ✓');
}

function editEntry(id) {
  const entry = entries.find(e => e.id === id);
  if (entry) openModal(entry);
}

async function deleteEntry(id) {
  if (!confirm('この記録を削除しますか？')) return;
  await save(null, id);
  entries = entries.filter(e => e.id !== id);
  render();
  showToast('削除しました');
}

function viewImage(src) {
  document.getElementById('imgViewerSrc').src = src;
  document.getElementById('imgViewer').classList.add('show');
}

function exportData() {
  const payload = { entries: entries, oshiOrder: oshiOrder };
  const blob = new Blob([JSON.stringify(payload, null, 2)], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const now = new Date();
  const ts = now.toISOString().slice(0,10);
  a.href = url;
  a.download = `oshikatsu_backup_${ts}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast('バックアップを書き出しました ✓');
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async e => {
    try {
      const parsed = JSON.parse(e.target.result);
      let data, order;
      if (Array.isArray(parsed)) {
        data = parsed;
        order = null;
      } else if (parsed && Array.isArray(parsed.entries)) {
        data = parsed.entries;
        order = Array.isArray(parsed.oshiOrder) ? parsed.oshiOrder : null;
      } else {
        throw new Error('invalid format');
      }
      if (entries.length > 0) {
        if (!confirm(`現在の記録(${entries.length}件)を、復元データ(${data.length}件)で上書きしますか？\n「キャンセル」で追加読み込みになります。`)) {
          const existingIds = new Set(entries.map(e => e.id));
          const toAdd = data.filter(d => !existingIds.has(d.id));
          await dbPutAll(toAdd);
          entries.push(...toAdd);
          if (order) {
            const merged = [...oshiOrder, ...order.filter(o => !oshiOrder.includes(o))];
            oshiOrder = merged;
            await saveOshiOrder();
          }
          render();
          showToast(`${toAdd.length}件を追加読み込みしました`);
          return;
        }
      }
      await dbClear();
      await dbPutAll(data);
      entries = data;
      if (order) {
        oshiOrder = order;
        await saveOshiOrder();
      }
      render();
      showToast('復元しました ✓');
    } catch(err) {
      showToast('読み込みに失敗しました');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

// PWA: register service worker
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}

load();
</script>
